name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          check-latest: true
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Файлы не прошли gofmt:"
            echo "$unformatted"
            exit 1
          fi
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./...

  component-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: component tests (docker compose)
        # Раннер godog в контейнере против бинаря-SUT + LLM-стаба.
        # По умолчанию пропускает @wip — гоняет smoke + реализованные слайсы.
        run: ./component-tests/scripts/run-tests.sh
