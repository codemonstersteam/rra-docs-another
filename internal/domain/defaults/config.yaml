llm:
  provider: anthropic
  model: claude-sonnet-4-6
  api_key_env: ANTHROPIC_API_KEY
  base_url: ""
  # Задержка между последовательными LLM-вызовами (мс).
  # 0 = без паузы (для тестов со стабом).
  # Для реального Anthropic API tier-1 рекомендуется 10000.
  call_delay_ms: 0
  # Защитный лимит токенов на вызов (usage.total_tokens). Предохранитель от
  # аномалий — выше реального максимума целевых репо (skill http-io). 0 → дефолт 300000.
  token_budget: 300000
  # Повторы на 429 с бэкоффом по Retry-After. 0 = без повтора (дефолт).
  # Для реального API рекомендуется 1-2.
  max_retries: 0
  # Максимум вызовов Judge на один запуск (бюджет нагрузки L6c).
  # 0 → дефолт 20.
  max_judge_calls: 0

prompts:
  maintainer: |
    role:maintainer
    Ты — эксперт по технической документации. Оцени документацию репозитория
    с позиции инженера-мейнтейнера (автора и хранителя кода).

    Критерии:
    - Описан ли API (эндпоинты, форматы, pipe-описания)?
    - Есть ли архитектурные решения (ADR) и docs/architecture.md?
    - Описан ли процесс разработки и тестирования?
    - Понятно ли, как запустить, собрать, задеплоить?

    Верни ТОЛЬКО JSON без пояснений:
    {"status":"PASS","score":85,"gaps":[]}

  consumer: |
    role:consumer
    Ты — эксперт по технической документации. Оцени документацию репозитория
    с позиции инженера-потребителя (другой команды, интегрирующейся с сервисом).

    Критерии:
    - Понятно ли за 5 минут, что делает сервис и зачем?
    - Описан ли публичный API с примерами использования?
    - Есть ли quickstart или пример интеграции?
    - Описаны ли ограничения, лимиты, внешние зависимости?

    Верни ТОЛЬКО JSON без пояснений:
    {"status":"PASS","score":85,"gaps":[]}

  manager: |
    role:manager
    Ты — эксперт по технической документации. Оцени документацию репозитория
    с позиции менеджера продукта или технического руководителя.

    Критерии:
    - Понятно ли, какую бизнес-задачу решает сервис?
    - Есть ли описание текущего статуса и что планируется?
    - Понятно ли, кто владелец и где найти информацию?
    - Описаны ли ключевые метрики или SLO?

    Верни ТОЛЬКО JSON без пояснений:
    {"status":"PASS","score":85,"gaps":[]}

  agent: |
    role:agent
    Ты — эксперт по технической документации. Оцени документацию репозитория
    с позиции ИИ-агента, которому нужно загрузить контекст и выполнить задачу.

    Критерии:
    - Есть ли CLAUDE.md или AGENTS.md с правилами работы агента?
    - Описана ли структура проекта и ключевые файлы?
    - Есть ли карта модулей и их зависимостей?
    - Описаны ли конвенции кода, стиль коммитов, запреты?

    Верни ТОЛЬКО JSON без пояснений:
    {"status":"PASS","score":85,"gaps":[]}

docs:
  - README.md
  - CLAUDE.md
  - CONTRIBUTING.md
  - AGENTS.md

# required_files — обязательные файлы в корне репозитория (слой L3, слайс
# structure). Сопоставление по basename, регистронезависимо. Отсутствие любого —
# blocker (code: missing_required_file). Секция обязательна: кастомный --config
# без required_files → config_invalid.
required_files:
  - README.md

# manifests — известные файлы-манифесты для разбора зависимостей (claim-kind
# dependency, слой L6, слайс drift). Сопоставление по basename. Секция
# обязательна: кастомный --config без manifests → config_invalid.
manifests:
  - go.mod
  - package.json
  - Cargo.toml
  - pyproject.toml
  - requirements.txt

# link_extensions — allowlist расширений файловых ссылок в документации (слой L6,
# слайс drift). Только токены, чей последний сегмент оканчивается на .<ext> из
# этого списка, признаются файловыми claim-kind link. Сопоставление регистронезависимо.
# Секция обязательна: кастомный --config без link_extensions → config_invalid.
link_extensions:
  - md
  - markdown
  - txt
  - go
  - mod
  - sum
  - sh
  - bash
  - yml
  - yaml
  - json
  - toml
  - feature
  - sql
  - proto
  - py
  - rs
  - ts
  - js
  - tsx
  - html
  - css

thresholds:
  drift_days: 90
  readability_min: 50

# jtbd — словари обязательных секций по JTBD-ролям (слой L4, слайс jtbd).
# name      — каноническое имя секции (попадает в gaps при отсутствии).
# synonyms  — нормализованные подстроки (нижний регистр); хотя бы одна должна
#             входить в нормализованный заголовок H1–H3 документа.
# critical  — true → отсутствие даёт FAIL, false → PARTIAL.
# Секция обязательна: кастомный --config без jtbd → config_invalid.
jtbd:
  consumers:
    - role: maintainer
      sections:
        - name: архитектура
          synonyms: [архитектура, architecture]
          critical: true
        - name: контрибьютить
          synonyms: [контрибьютить, contributing]
          critical: true
    - role: consumer
      sections:
        - name: запуск
          synonyms: [запуск, quick start, getting started, install]
          critical: true
        - name: api
          synonyms: [api, апи, endpoints]
          critical: false
    - role: manager
      sections:
        - name: умеет
          synonyms: [умеет, capabilities, features, overview]
          critical: true
    - role: agent
      sections:
        - name: agents
          synonyms: [agents, агент, контекст]
          critical: true
